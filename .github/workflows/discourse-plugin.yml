name: Discourse Plugin

# Triggers:
#   - push to main      → every merge runs CI
#   - pull_request      → CI on every PR commit
#   - workflow_dispatch → run manually from the Actions tab
#   - schedule (weekly) → catch upstream Discourse changes that break
#                         this plugin even when its own code is unchanged
#
# Only `main` (a.k.a. Discourse "latest" / tests-passed) is tested.
# Stable isn't a target — this plugin is deployed to a single forum
# tracking tests-passed, so supporting older Discourse branches would
# add maintenance cost (e.g. avoiding ui-kit/ imports) for no real
# audience.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # Mondays at 05:00 UTC. Quiet time outside business hours in any
    # major timezone so weekly runs don't compete with active PR CI.
    - cron: "0 5 * * 1"

# Cancel an in-progress run when a newer commit lands on the same
# branch. Main is excluded so post-merge runs (and the scheduled run)
# always complete and report status to the commit history.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    uses: discourse/.github/.github/workflows/discourse-plugin.yml@v1
    with:
      core_ref: main
